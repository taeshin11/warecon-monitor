<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FAFAF8"/>
  <rect x="0" y="0" width="1200" height="4" fill="#4A72FF"/>

  <!-- Title -->
  <text x="600" y="160" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="56" fill="#2D2D2D">WarEcon Monitor</text>
  <text x="600" y="210" text-anchor="middle" font-family="sans-serif" font-weight="400" font-size="24" fill="#6B7280">Live War-Impact Commodity Price Dashboard</text>

  <!-- Chart line -->
  <polyline points="150,380 250,360 350,340 400,390 450,350 500,320 550,370 600,300 650,310 700,280 750,330 800,290 850,260 900,310 950,270 1050,250" fill="none" stroke="#34D399" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="150,400 250,410 350,390 400,420 450,400 500,430 550,410 600,440 650,420 700,450 750,430 800,440 850,460 900,440 950,450 1050,460" fill="none" stroke="#F87171" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>

  <!-- Event annotation -->
  <line x1="600" y1="260" x2="600" y2="470" stroke="#FBBF24" stroke-width="1.5" stroke-dasharray="6,4"/>
  <rect x="530" y="248" width="140" height="20" rx="4" fill="#FBBF24" opacity="0.15"/>
  <text x="600" y="262" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#9CA3AF">Geopolitical Event</text>

  <!-- Commodity labels -->
  <g transform="translate(0, 530)">
    <rect x="100" y="0" width="120" height="32" rx="8" fill="#F3F1EE"/>
    <text x="160" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">Crude Oil</text>

    <rect x="240" y="0" width="120" height="32" rx="8" fill="#F3F1EE"/>
    <text x="300" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">Nat Gas</text>

    <rect x="380" y="0" width="100" height="32" rx="8" fill="#F3F1EE"/>
    <text x="430" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">Wheat</text>

    <rect x="500" y="0" width="100" height="32" rx="8" fill="#F3F1EE"/>
    <text x="550" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">Corn</text>

    <rect x="620" y="0" width="100" height="32" rx="8" fill="#F3F1EE"/>
    <text x="670" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">Gold</text>

    <rect x="740" y="0" width="120" height="32" rx="8" fill="#F3F1EE"/>
    <text x="800" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#6B7280">Brent Oil</text>

    <rect x="880" y="0" width="200" height="32" rx="8" fill="#4A72FF" opacity="0.1"/>
    <text x="980" y="21" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#4A72FF">Free Dashboard</text>
  </g>

  <!-- Tagline -->
  <text x="600" y="490" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#9CA3AF">Track how geopolitical conflict moves global commodity markets</text>
</svg>
